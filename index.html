<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻頁時鐘</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Slab:wght@400&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: 'Roboto Slab', serif;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#date {
  font-size:70px;
  margin-bottom:10px;
}
#weekday {
  font-size:40px;
  margin-bottom:50px;
  color:#bbb;
}
.clock {
  display:flex;
  align-items:center;
}
.flip {
  position: relative;
  perspective: 1000px;
  margin: 0 5px;
}
.flip .top, .flip .bottom {
  display:block;
  height: 75px; /* 半高度 */
  overflow:hidden;
  font-size:150px;
  font-family:'Orbitron', monospace;
  font-weight:bold;
  color:#fff;
  text-shadow:0 4px 8px rgba(0,0,0,0.7);
  background: linear-gradient(to bottom, #333, #000);
  border-radius:14px;
  text-align:center;
}
.flip .bottom {
  border-top:1px solid #222;
}
.flip .flip-top {
  animation: flipTop 0.5s forwards;
}
.flip .flip-bottom {
  animation: flipBottom 0.5s forwards;
}
@keyframes flipTop {
  0% { transform: rotateX(0deg); }
  100% { transform: rotateX(-90deg); }
}
@keyframes flipBottom {
  0% { transform: rotateX(90deg); }
  100% { transform: rotateX(0deg); }
}
.colon {
  font-size:120px;
  margin:0 5px;
}
#slider {
  position:fixed;
  bottom:25px;
  width:60%;
}
</style>
</head>
<body>
<div id="date">2026年3月12日</div>
<div id="weekday">星期四</div>
<div class="clock">
  <div class="flip" id="h" data-current="00">
    <span class="top">00</span>
    <span class="bottom">00</span>
  </div>
  <div class="colon">:</div>
  <div class="flip" id="m" data-current="00">
    <span class="top">00</span>
    <span class="bottom">00</span>
  </div>
</div>
<input type="range" min="40" max="130" value="70" id="slider">

<script>
var week=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

function flipDigit(flip, newNumber){
  let top = flip.querySelector(".top");
  let bottom = flip.querySelector(".bottom");
  top.textContent = flip.dataset.current;
  bottom.textContent = newNumber;

  top.classList.add("flip-top");
  bottom.classList.add("flip-bottom");

  setTimeout(()=>{
    flip.dataset.current = newNumber;
    top.textContent = newNumber;
    top.classList.remove("flip-top");
    bottom.classList.remove("flip-bottom");
  },500);
}

function update(){
  var now = new Date();
  var y = now.getFullYear();
  var mo = now.getMonth()+1;
  var d = now.getDate();
  var w = week[now.getDay()];
  var h = ("0"+now.getHours()).slice(-2);
  var m = ("0"+now.getMinutes()).slice(-2);

  document.getElementById("date").innerHTML = y+"年"+mo+"月"+d+"日";
  document.getElementById("weekday").innerHTML = w;

  let hFlip = document.getElementById("h");
  let mFlip = document.getElementById("m");

  if(hFlip.dataset.current !== h) flipDigit(hFlip, h);
  if(mFlip.dataset.current !== m) flipDigit(mFlip, m);
}

setInterval(update,1000);
update();

document.getElementById("slider").oninput=function(){
  document.getElementById("date").style.fontSize=this.value+"px";
}
</script>
</body>
</html>
